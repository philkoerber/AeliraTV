server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy HLS segments to audio-service
    location /hls/ {
        proxy_pass http://audio-service:8001/hls/;
        proxy_set_header Host $host;

        # HLS segments: short cache, CORS
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    # Proxy /state to audio-service
    location /state {
        proxy_pass http://audio-service:8001/state;
        proxy_set_header Host $host;
    }
}
